<svg xmlns="http://www.w3.org/2000/svg" width="800" height="280" viewBox="0 0 800 280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#11111b"/>
      <stop offset="50%" style="stop-color:#1e1e2e"/>
      <stop offset="100%" style="stop-color:#181825"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#94e2d5"/>
      <stop offset="25%" style="stop-color:#89dceb"/>
      <stop offset="50%" style="stop-color:#89b4fa"/>
      <stop offset="75%" style="stop-color:#b4befe"/>
      <stop offset="100%" style="stop-color:#cba6f7"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#94e2d5;stop-opacity:0.10"/>
      <stop offset="50%" style="stop-color:#89b4fa;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#cba6f7;stop-opacity:0.04"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#89dceb;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#94e2d5;stop-opacity:0.03"/>
    </linearGradient>
    <linearGradient id="wave3" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#b4befe;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#89b4fa;stop-opacity:0.02"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#94e2d5;stop-opacity:0"/>
      <stop offset="15%" style="stop-color:#94e2d5"/>
      <stop offset="35%" style="stop-color:#89dceb"/>
      <stop offset="50%" style="stop-color:#89b4fa"/>
      <stop offset="65%" style="stop-color:#b4befe"/>
      <stop offset="85%" style="stop-color:#cba6f7"/>
      <stop offset="100%" style="stop-color:#cba6f7;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-subtle">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="280" rx="12" fill="url(#bg)"/>

  <!-- Wave decorations -->
  <path d="M0 200 Q200 160 400 190 T800 170 L800 280 L0 280 Z" fill="url(#wave1)"/>
  <path d="M0 220 Q200 190 400 210 T800 195 L800 280 L0 280 Z" fill="url(#wave2)"/>
  <path d="M0 240 Q200 215 400 235 T800 220 L800 280 L0 280 Z" fill="url(#wave3)"/>

  <!-- Subtle water particles -->
  <g filter="url(#glow-subtle)" opacity="0.6">
    <circle cx="680" cy="210" r="1.5" fill="#94e2d5"/>
    <circle cx="720" cy="220" r="1" fill="#89dceb"/>
    <circle cx="740" cy="205" r="1.5" fill="#89b4fa"/>
    <circle cx="700" cy="230" r="1" fill="#b4befe"/>
    <circle cx="760" cy="215" r="1" fill="#cba6f7"/>
    <circle cx="650" cy="225" r="1" fill="#94e2d5"/>
    <circle cx="60" cy="220" r="1" fill="#94e2d5"/>
    <circle cx="100" cy="225" r="1.5" fill="#89dceb"/>
    <circle cx="75" cy="235" r="1" fill="#b4befe"/>
    <circle cx="45" cy="215" r="1" fill="#94e2d5"/>
    <circle cx="115" cy="218" r="1" fill="#cba6f7"/>
    <circle cx="130" cy="230" r="1.5" fill="#89b4fa"/>
    <circle cx="50" cy="240" r="1" fill="#89dceb"/>
  </g>

  <!-- Title -->
  <text x="400" y="125" font-family="'SF Mono','Fira Code','JetBrains Mono','Cascadia Code',Consolas,monospace"
        font-size="64" font-weight="bold" fill="url(#title-grad)" text-anchor="middle"
        letter-spacing="14" filter="url(#glow)">SHALLOWS</text>

  <!-- Accent line under title -->
  <rect x="140" y="143" width="520" height="2" rx="1" fill="url(#accent-line)"/>

  <!-- Subtitle -->
  <text x="400" y="175" font-family="'SF Mono','Fira Code','JetBrains Mono','Cascadia Code',Consolas,monospace"
        font-size="13" fill="#bac2de" text-anchor="middle"
        letter-spacing="5">BROWSER-NATIVE LINUX TERMINALS</text>

  <!-- Feature badges -->
  <g transform="translate(166, 205)">
    <!-- v86 wasm -->
    <rect x="0" y="0" width="100" height="28" rx="14" fill="#313244"/>
    <rect x="0" y="0" width="100" height="28" rx="14" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="16" cy="14" r="4" fill="#94e2d5"/>
    <text x="28" y="18" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="11" fill="#cdd6f4">v86 wasm</text>

    <!-- alpine linux -->
    <rect x="116" y="0" width="120" height="28" rx="14" fill="#313244"/>
    <rect x="116" y="0" width="120" height="28" rx="14" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="132" cy="14" r="4" fill="#89dceb"/>
    <text x="144" y="18" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="11" fill="#cdd6f4">alpine linux</text>

    <!-- virtual net -->
    <rect x="252" y="0" width="115" height="28" rx="14" fill="#313244"/>
    <rect x="252" y="0" width="115" height="28" rx="14" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="268" cy="14" r="4" fill="#89b4fa"/>
    <text x="280" y="18" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="11" fill="#cdd6f4">virtual net</text>

    <!-- offline -->
    <rect x="383" y="0" width="85" height="28" rx="14" fill="#313244"/>
    <rect x="383" y="0" width="85" height="28" rx="14" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="399" cy="14" r="4" fill="#f9e2af"/>
    <text x="411" y="18" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="11" fill="#cdd6f4">offline</text>
  </g>
</svg>
